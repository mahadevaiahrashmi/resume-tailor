<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resume Tailor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Resume&nbsp;Tailor</h1>
    <p class="tagline">Tailor a resume &amp; cover letter to any job — 1-page Word &amp; PDF.</p>
  </header>

  <main class="layout">
    <section class="panel form-panel">
      <form id="tailor-form">
        <div class="field">
          <label for="provider">AI engine</label>
          <div class="row">
            <select id="provider" name="provider">
              {% for p in providers %}
              <option value="{{ p.name }}">{{ p.label }}{% if not p.available %} — not detected{% endif %}</option>
              {% endfor %}
            </select>
            <input type="text" id="model" name="model" placeholder="model (optional, e.g. qwen2.5)" />
          </div>
          <p class="hint" id="provider-hint"></p>
        </div>

        <div class="field">
          <label for="jd">Job description <span class="req">*</span></label>
          <textarea id="jd" name="jd" rows="8" placeholder="Paste the job posting here…" required></textarea>
        </div>

        <div class="field">
          <label for="resume">Your current resume <span class="req">*</span></label>
          <textarea id="resume" name="resume" rows="10" placeholder="Paste your existing resume (plain text)…" required></textarea>
        </div>

        <div class="field">
          <label for="instructions">Extra instructions</label>
          <textarea id="instructions" name="instructions" rows="3" placeholder="e.g. Emphasize production ML and leadership. Keep a confident tone."></textarea>
        </div>

        <button type="submit" id="go" class="primary">Generate documents</button>
        <p class="hint">Nothing is uploaded to us — generation runs locally via the engine you pick.</p>
      </form>
    </section>

    <section class="panel result-panel">
      <div id="status" class="status idle">Fill the form and click <strong>Generate</strong>.</div>

      <div id="downloads" class="downloads hidden">
        <h2>Download</h2>
        <div id="download-buttons" class="download-buttons"></div>
      </div>

      <div id="preview" class="preview hidden">
        <h2>Preview</h2>
        <div class="preview-tabs">
          <button type="button" class="tab active" data-tab="resume">Resume</button>
          <button type="button" class="tab" data-tab="cover">Cover letter</button>
        </div>
        <div id="preview-resume" class="preview-body"></div>
        <div id="preview-cover" class="preview-body hidden"></div>
      </div>
    </section>
  </main>

  <footer class="foot">
    Runs with <strong>Claude CLI</strong>, <strong>Gemini CLI</strong>, or <strong>Ollama</strong> (open source). Mock engine works offline.
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
